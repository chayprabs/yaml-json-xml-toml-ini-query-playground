name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build browser engine assets
        run: bash scripts/build-engine.sh

      - name: Setup wasm_exec.js
        run: |
          curl -o public/wasm_exec.js https://raw.githubusercontent.com/golang/go/refs/heads/master/lib/wasm/wasm_exec.js
          GOROOT_PATH="$(go env GOROOT)"
          if [ -d "$GOROOT_PATH/lib/wasm" ]; then
            TARGET_DIR="$GOROOT_PATH/lib/wasm"
          elif [ -d "$GOROOT_PATH/misc/wasm" ]; then
            TARGET_DIR="$GOROOT_PATH/misc/wasm"
          else
            TARGET_DIR="$GOROOT_PATH/lib/wasm"
          fi
          mkdir -p "$TARGET_DIR"
          cp public/wasm_exec.js "$TARGET_DIR/wasm_exec.js"

      - name: Run Go tests
        run: npm run test:go

      - name: Go vet
        run: node scripts/run-go.cjs vet ./...

      - name: Install staticcheck
        run: node scripts/run-go.cjs install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: |
          STATICCHECK="$(node scripts/run-go.cjs env GOPATH | tr -d '\r')/bin/staticcheck"
          "$STATICCHECK" ./...

      - name: Typecheck
        run: npx tsc --noEmit --strict

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Build WASM engines
        run: bash scripts/build-engine.sh

      - name: Build static export
        env:
          GITHUB_ACTIONS: "false"
        run: npm run build

      - name: Verify build output
        run: |
          test -f out/index.html || (echo "MISSING: out/index.html" && exit 1)
          test -f out/wasm_exec.js || (echo "MISSING: out/wasm_exec.js" && exit 1)
          test -f out/engine-yq.wasm || (echo "MISSING: out/engine-yq.wasm" && exit 1)
          test -f out/engine-dasel.wasm || (echo "MISSING: out/engine-dasel.wasm" && exit 1)
          ls -lh out/*.wasm out/wasm_exec.js
          echo "All required files present"

      - name: Run end-to-end tests
        run: npx playwright test --project=chromium --workers=1 --reporter=line,github
